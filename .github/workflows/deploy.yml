name: Deploy to Azure App Service

# On-demand release (not push-triggered): `gh workflow run deploy.yml`.
# Pushing to main does NOT deploy. Mirrors the SB/HS release model.
# Schema changes are applied via the in-VNet ACI gated-release path
# (poassociation-release.mjs), NOT from this public runner — the Flex is
# private and drizzle-kit migrate cannot reach it from here.
on:
  workflow_dispatch:
    inputs:
      skip_migrations:
        description: 'Unused here (schema is applied via ACI gated-release, not the runner). Kept for parity.'
        required: false
        default: true
        type: boolean

permissions:
  id-token: write
  contents: read

env:
  APP_NAME: poassociation
  NODE_VERSION: '20.x'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies (incl. devDeps for the build)
        run: npm ci --include=dev --no-audit --no-fund
        env:
          NODE_ENV: development
          NPM_CONFIG_PRODUCTION: "false"
          NPM_CONFIG_OMIT: ""
          NPM_CONFIG_INCLUDE: dev

      - name: Diagnose dev-dep install
        run: |
          echo "omit=$(npm config get omit) production=$(npm config get production) include=$(npm config get include)"
          env | grep -iE 'npm_config|node_env' || true
          npm ls vite esbuild || true
          echo "--- .bin (vite/esbuild) ---"; ls node_modules/.bin 2>/dev/null | grep -E 'vite|esbuild' || echo "NONE"

      - name: Build client + server
        run: npm run build
        env:
          NODE_ENV: development

      - name: Prune dev dependencies
        run: npm prune --omit=dev

      - name: Stage deploy artifact
        run: |
          mkdir -p deploy
          # cp -a preserves symlinks (node_modules/.bin). dist holds index.js + public/.
          cp -a dist node_modules package.json package-lock.json deploy/
          cd deploy && zip -rqy ../app.zip .

      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.APP_NAME }}
          package: app.zip

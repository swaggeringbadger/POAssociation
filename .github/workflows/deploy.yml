name: Deploy to Azure App Service

# On-demand release (not push-triggered): `gh workflow run deploy.yml`.
# Pushing to main does NOT deploy. Mirrors the SB/HS release model.
# Schema changes are applied via the in-VNet ACI gated-release path
# (poassociation-release.mjs), NOT from this public runner — the Flex is
# private and drizzle-kit migrate cannot reach it from here.
on:
  workflow_dispatch:
    inputs:
      skip_migrations:
        description: 'Unused here (schema is applied via ACI gated-release, not the runner). Kept for parity.'
        required: false
        default: true
        type: boolean

permissions:
  id-token: write
  contents: read

env:
  APP_NAME: poassociation
  NODE_VERSION: '20.x'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies (incl. devDeps for the build)
        run: npm ci --include=dev --no-audit --no-fund
        env:
          NODE_ENV: development
          NPM_CONFIG_PRODUCTION: "false"
          NPM_CONFIG_OMIT: ""
          NPM_CONFIG_INCLUDE: dev

      # The org/runner npm config doesn't create node_modules/.bin symlinks
      # (bin-links effectively off), so `vite build` via the package.json script
      # can't resolve. Invoke the installed packages by path — deterministic,
      # no .bin and no network. (Mirrors `npm run build`: vite build → esbuild bundle.)
      - name: Build client + server
        run: |
          node node_modules/vite/bin/vite.js build
          node node_modules/esbuild/bin/esbuild server/index.ts --platform=node --packages=external --bundle --format=esm --outdir=dist
        env:
          NODE_ENV: development

      # `npm prune --omit=dev` on this org runner wrongly strips prod deps
      # (`pg` vanished → ERR_MODULE_NOT_FOUND crash-loop, incident 2026-06-07) —
      # the same flaky npm config that forced the build step to invoke tools by
      # path. A clean prod-only install from the (correct) lockfile is
      # deterministic. We've already built above, so dropping the dev toolchain
      # now is safe. Explicit env because the org npm defaults can't be trusted.
      - name: Reinstall production deps only (clean, deterministic)
        run: rm -rf node_modules && npm ci --omit=dev --no-audit --no-fund
        env:
          NODE_ENV: production
          NPM_CONFIG_PRODUCTION: "true"
          NPM_CONFIG_OMIT: dev
          NPM_CONFIG_INCLUDE: ""

      # The server bundle keeps deps external (--packages=external), so the
      # runtime relies on these being present in node_modules. Fail loudly here
      # if `pg` (or any required runtime dep) is ever missing, rather than
      # discovering it as a crash-loop on the App Service (incident 2026-06-07).
      - name: Verify runtime deps present in artifact (pg)
        run: |
          test -f node_modules/pg/package.json || { echo "::error::pg missing from node_modules — App Service will crash-loop"; exit 1; }
          node -e "require.resolve('pg')"
          echo "pg present: $(node -e "console.log(require('pg/package.json').version)")"

      - name: Stage deploy artifact
        run: |
          mkdir -p deploy
          # cp -a preserves symlinks (node_modules/.bin). dist holds index.js + public/.
          cp -a dist node_modules package.json package-lock.json deploy/
          cd deploy && zip -rqy ../app.zip .

      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.APP_NAME }}
          package: app.zip
